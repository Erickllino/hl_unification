services:

  # ── Brain (hsl-player C++) ────────────────────────────────
  # Lógica de jogo: behavior trees, visão, game controller.
  # Publica /rl_move → deploy (sim) ou deploy interno (robô real).
  # Para simulação: deploy:=false (deploy roda no container sim).
  # Para robô real: ros2 launch brain launch.py (deploy:=true por padrão).
  brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hl-uni
    container_name: hl_brain
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - ../hsl-player:/workspace/hsl-player
      - ../booster_deploy:/workspace/booster_deploy
      - ../booster_assets:/workspace/booster_assets
      - ../booster_internal_headers:/usr/local/include/booster_internal:ro
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: >
      bash -c "
        source /workspace/hsl-player/install/setup.bash &&
        ros2 launch brain launch.py tree:=game.xml sim:=true disable_log:=true role:=striker
      "

  # ── Simulador MuJoCo (hl_sim) ────────────────────────────
  # Apenas o simulador. Deploy roda no container brain.
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hl-uni
    container_name: hl_sim
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - ../../hl_sim:/workspace/hl_sim
      - ../hsl-player:/workspace/hsl-player
      # X11 para o viewer interativo do MuJoCo
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
      - LIBGL_ALWAYS_SOFTWARE=1 # software rendering — sem GPU no container
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: bash -c "cd /workspace/hl_sim && uv run python scripts/run_ros2.py --duration 0 --viewer"

  # ── GameController (RoboCup HL) ──────────────────────────
  # Recebe pacotes UDP do GameController oficial (porta 3838)
  # e publica em /robocup/game_controller para o brain.
  # network_mode: host é obrigatório para receber UDP broadcast.
  game_controller:
    image: hl-uni
    container_name: hl_game_controller
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - ../hsl-player:/workspace/hsl-player
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: >
      bash -c "
        source /workspace/hsl-player/install/setup.bash &&
        ros2 launch game_controller launch.py
      "

  # ── Shell de desenvolvimento ──────────────────────────────
  # Container interativo para debugar, rodar comandos ROS2, etc.
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hl-uni
    container_name: hl_dev
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace # monta o projeto inteiro
      - ../booster_internal_headers:/usr/local/include/booster_internal:ro
      # X11 para rodar rviz2 ou outros visualizadores dentro do container
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY} # redireciona display do host
    command: bash
